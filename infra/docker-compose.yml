# Variable substitution reads `.env` from the same directory as this file (`infra/.env`),
# or export vars before `docker compose build`. Example:
#   export NEXT_PUBLIC_SANDBOX_URL=http://YOUR_PUBLIC_IP:9000
#   docker compose -f infra/docker-compose.yml build frontend
services:
  sandbox:
    build:
      context: ..
      dockerfile: infra/Dockerfile.sandbox
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - samples:/tmp/samples
      - db:/app/data
    environment:
      - PANTHEON_DB_PATH=/app/data/pantheon.db
      - SANDBOX_API_URL=http://sandbox:9000
      - PANTHEON_STREAM_BACKEND=${PANTHEON_STREAM_BACKEND:-none}
      - PANTHEON_KAFKA_BOOTSTRAP_SERVERS=${PANTHEON_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      - PANTHEON_KAFKA_TOPIC=${PANTHEON_KAFKA_TOPIC:-pantheon.events}
    networks:
      - pantheon
    env_file: ../.env
    restart: unless-stopped

  frontend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.frontend
      args:
        # Set in root `.env` (e.g. NEXT_PUBLIC_SANDBOX_URL=http://YOUR_PUBLIC_IP:9000 or http://YOUR_PUBLIC_IP for nginx /ws).
        NEXT_PUBLIC_SANDBOX_URL: ${NEXT_PUBLIC_SANDBOX_URL:-http://127.0.0.1:9000}
    ports:
      - "3000:3000"
    networks:
      - pantheon
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - sandbox
      - frontend
    networks:
      - pantheon
    restart: unless-stopped

  kafka:
    image: redpandadata/redpanda:v24.1.9
    profiles: ["kafka"]
    command:
      - redpanda
      - start
      - --overprovisioned
      - --smp=1
      - --memory=512M
      - --reserve-memory=0M
      - --node-id=0
      - --check=false
      - --kafka-addr=PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr=PLAINTEXT://kafka:9092
    ports:
      - "9092:9092"
    networks:
      - pantheon
    restart: unless-stopped

volumes:
  samples:
  db:

networks:
  pantheon:
    driver: bridge
