server {
    listen 80;
    server_name _;

    client_max_body_size 20M;

    # Docker internal DNS resolver
    resolver 127.0.0.11 valid=10s;

    # ── WebSocket endpoint — MUST come before generic /sandbox ──
    location /ws {
        set $sandbox_upstream sandbox:9000;
        proxy_pass http://$sandbox_upstream/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ── Event ingest (agents POST here) ──
    location /events {
        set $sandbox_upstream sandbox:9000;
        proxy_pass http://$sandbox_upstream/events;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Sandbox API ──
    location /sandbox/ {
        set $sandbox_upstream sandbox:9000;
        proxy_pass http://$sandbox_upstream/sandbox/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    # ── Dashboard (Next.js) ──
    location /dashboard {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream/dashboard;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Next.js static assets ──
    location /_next/ {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream/_next/;
        proxy_set_header Host $host;
    }

    # ── Landing page (root) ──
    location / {
        set $frontend_upstream frontend:3000;
        proxy_pass http://$frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
